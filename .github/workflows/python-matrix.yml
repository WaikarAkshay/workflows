name: python lint
on: 
  workflow_dispatch:
jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: checkout code
        uses: actions/checkout@v4
      - name: set up python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: install dependencies
        run: pip install -r requirement.txt
      - name: Run linter
        run: flake8

      
      
      
